<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Reaction Tester</title>
</head>
<body>
    <div id="Rules">
        <h1>Rules:</h1>
        <h2>There will be a box in the middle of the screen</h2>
        <h2>When the box changes color, press spacebar</h2>
        <h2>and your reaction speed will be recorded</h2>
        <h3>Press spacebar to begin playing</h3>
    </div>
    <div id="Game">
        <h2>High Score: </h2>
        <div id="Box">

        </div>
    </div>
    <div id="Game-Over">
        <h1 id="reaction-time-display">Reaction Speed: </h1>
        <h3>Press spacebar to play again</h3>
        <h2>High Score: </h2>
    </div>
    <script src="script.js"></script>
</body>
</html>
